<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>양자 암호 통신 시뮬레이터</title>
<style>
    /* CSS 변수를 통해 JS에서 실시간으로 속도를 조절합니다. */
    :root {
        --speed-mult: 1;
        --transit-time: 1s; 
    }

    body {
        font-family: 'Malgun Gothic', sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f0f2f5;
        color: #333;
    }
    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #1a237e;
    }

    /* 상단 애니메이션 영역 */
    #animation-stage {
        width: 100%;
        height: 160px; 
        background-color: #2c3e50;
        border-radius: 12px;
        position: relative;
        margin-bottom: 30px;
        overflow: hidden;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
    }
    
    /* 송수신 기기 */
    .device {
        position: absolute;
        top: 20px;
        width: 90px;
        height: 120px;
        background-color: #ecf0f1;
        border-radius: 8px;
        font-weight: bold;
        z-index: 10;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 14px;
        text-align: center;
    }
    #alice-device { left: 2%; border: 3px solid #3498db; }
    #eve-device { left: 45%; border: 3px solid #e74c3c; display: none; }
    #bob-device { right: 2%; border: 3px solid #2ecc71; }
    
    /* 경로상에 설치된 정사각형 편광판 컨테이너 */
    .polarizer-container {
        position: absolute;
        top: 55px; 
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 12;
        display: none; 
    }
    #alice-pol-container { left: 16%; }
    #eve-pol-container { left: 38%; } 
    #bob-pol-container { left: 75%; }
    
    /* 정사각형 편광판 필터 */
    .polarizer {
        width: 50px;
        height: 50px;
        border: 4px solid #34495e;
        border-radius: 4px; 
        background-color: rgba(220, 240, 255, 0.85);
        background-image: 
            linear-gradient(90deg, transparent 46%, #2c3e50 46%, #2c3e50 54%, transparent 54%),
            linear-gradient(0deg, transparent 46%, #2c3e50 46%, #2c3e50 54%, transparent 54%);
        transition: transform calc(0.4s * var(--speed-mult)) cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: inset 0 0 5px rgba(0,0,0,0.3), 0 4px 6px rgba(0,0,0,0.2);
    }
    
    /* 편광판 받침대 */
    .polarizer-base {
        width: 15px;
        height: 15px;
        background-color: #7f8c8d;
        border-radius: 2px;
        box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    /* 광자 */
    .photon {
        position: absolute;
        top: 65px; 
        width: 30px;
        height: 30px;
        background-color: #f1c40f;
        border-radius: 50%;
        text-align: center;
        line-height: 30px;
        font-weight: bold;
        font-size: 20px;
        color: #d35400;
        box-shadow: 0 0 15px #f1c40f;
        z-index: 15;
        display: none;
        transition: left calc(var(--transit-time) * var(--speed-mult)) linear, transform calc(0.3s * var(--speed-mult)) ease-in-out;
    }

    /* 전체 레이아웃 */
    .simulation-layout { display: flex; justify-content: space-between; gap: 20px; max-width: 1400px; margin: 0 auto; }
    .column { flex: 1; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    .col-sender { background-color: #e3f2fd; border: 2px solid #90caf9; }
    .col-receiver { background-color: #e8f5e9; border: 2px solid #a5d6a7; }
    .col-center { background-color: #fafafa; border: 2px solid #eeeeee; }

    .person-title { font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px dashed #ccc; }
    
    /* 4x4 그리드 정렬 적용 */
    .bits-container { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); /* 4열 배치 */
        gap: 10px; 
        justify-items: center; 
    }

    .bit-box { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 8px; width: 55px; text-align: center; box-shadow: 1px 1px 3px rgba(0,0,0,0.1); opacity: 0.2; transition: opacity 0.3s; }
    .bit-box.active { opacity: 1; }
    .bit-box select { width: 100%; margin-bottom: 5px; font-size: 12px; }
    .symbol { font-size: 24px; font-weight: bold; margin-top: 5px; color: #1976d2; }

    .control-panel { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    .toggle-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .toggle-group label { font-weight: bold; cursor: pointer; color: #d32f2f; }
    
    .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 8px; margin: 5px; transition: background-color 0.3s; }
    button:hover { background-color: #45a049; }
    button:disabled { background-color: #9e9e9e; cursor: not-allowed; }
    .btn-compare { background-color: #2196F3; }
    .btn-compare:hover { background-color: #1976d2; }

    #result-box, #eve-compare-box { margin-top: auto; padding: 15px; font-size: 15px; text-align: center; border-radius: 8px; display: none; margin-bottom: 15px; }
    #result-box { background: #fff3e0; border: 2px solid #ffcc80; }
    #eve-compare-box { background: #ffebee; border: 2px solid #ef9a9a; }
    .section-title { font-weight: bold; margin: 15px 0 10px 0; text-align: center; }
    .discarded { opacity: 0.3 !important; text-decoration: line-through; background-color: #eeeeee;}
    .eve-mismatch { background-color: #ffcdd2; border: 2px solid #f44336; }
</style>
</head>
<body>

<h2>양자 암호 통신 시뮬레이션 (10배속 & 4x4 배열 & 도청결과 자동표시)</h2>

<div id="animation-stage">
    <div id="alice-device" class="device">송신장치<br>(이재현)</div>
    <div class="polarizer-container" id="alice-pol-container">
        <div class="polarizer" id="alice-polarizer"></div><div class="polarizer-base"></div>
    </div>
    
    <div id="eve-device" class="device">도청장치<br>(Eve)</div>
    <div class="polarizer-container" id="eve-pol-container">
        <div class="polarizer" id="eve-polarizer"></div><div class="polarizer-base"></div>
    </div>
    
    <div class="polarizer-container" id="bob-pol-container">
        <div class="polarizer" id="bob-polarizer"></div><div class="polarizer-base"></div>
    </div>
    <div id="bob-device" class="device">수신탐지기<br>(김은찬)</div>
    
    <div id="photon" class="photon"></div>
</div>

<div class="simulation-layout">
    <div class="column col-sender">
        <div class="person-title">👨‍💻 송신자 (이재현)</div>
        <div class="bits-container" id="alice-container"></div>
    </div>

    <div class="column col-center">
        <div class="control-panel">
            <div class="toggle-group">
                <label><input type="checkbox" id="eveToggle" onchange="toggleEveDevice()"> 🕵️‍♀️ 외부 도청자(Eve) 개입</label>
                <label><input type="checkbox" id="evilBobToggle"> 🕵️‍♂️ 김은찬(수신자) 도청 여부 검증 (제삼자 개입)</label>
                <label style="color: #2e7d32;"><input type="checkbox" id="fastModeToggle"> ⏩ 10배속 진행 (실시간 적용)</label>
            </div>
            <div class="btn-group">
                <button id="btn-send" onclick="sendSignal()">신호 송신 🚀</button>
                <button id="btn-compare" class="btn-compare" onclick="compareBits()" disabled>편극 비교 🔍</button>
            </div>
        </div>
        <div id="eve-section" style="display: none;">
            <div class="section-title" style="color: #d32f2f;">🚨 외부 도청자 (Eve) 측정 (상태 붕괴)</div>
            <div class="bits-container" id="eve-container"></div>
        </div>
        <div id="charlie-section" style="display: none;">
            <div class="section-title" style="color: #7b1fa2;">⚖️ 제삼자 (수신자 도청 검증)</div>
            <div class="bits-container" id="charlie-container"></div>
        </div>
        <div id="eve-compare-box"></div>
        <div id="result-box"></div>
    </div>

    <div class="column col-receiver">
        <div class="person-title">👨‍💻 수신자 (김은찬)</div>
        <div id="bob-section" style="display: none;">
            <div class="bits-container" id="bob-container"></div>
        </div>
        <div id="bob-waiting" style="text-align: center; color: #888; margin-top: 50px;">
            이재현의 신호를 기다리는 중...
        </div>
    </div>
</div>

<script>
    const NUM_BITS = 16;
    let aliceData = []; let eveData = []; let bobData = []; let charlieData = [];
    let isSimulating = false;

    // 10배속 적용 (속도 배수를 0.1로 설정)
    document.getElementById('fastModeToggle').addEventListener('change', function() {
        document.documentElement.style.setProperty('--speed-mult', this.checked ? '0.1' : '1');
    });

    function getSymbol(bit, basis) {
        if (basis === '+') return bit == 0 ? '|' : '—';
        if (basis === 'x') return bit == 0 ? '/' : '\\';
        return '';
    }

    function initAlice() {
        const container = document.getElementById('alice-container');
        container.innerHTML = '';
        for (let i = 0; i < NUM_BITS; i++) {
            const div = document.createElement('div');
            div.className = 'bit-box active';
            
            const bitSelect = document.createElement('select');
            bitSelect.id = `a-bit-${i}`;
            bitSelect.innerHTML = `<option value="0">0</option><option value="1">1</option>`;
            bitSelect.value = Math.random() < 0.5 ? '0' : '1';
            
            const basisSelect = document.createElement('select');
            basisSelect.id = `a-basis-${i}`;
            basisSelect.innerHTML = `<option value="+">+</option><option value="x">x</option>`;
            basisSelect.value = Math.random() < 0.5 ? '+' : 'x';

            const symbolDiv = document.createElement('div');
            symbolDiv.className = 'symbol';
            symbolDiv.id = `a-symbol-${i}`;

            const updateSymbol = () => { symbolDiv.innerText = getSymbol(bitSelect.value, basisSelect.value); };
            bitSelect.onchange = updateSymbol; basisSelect.onchange = updateSymbol;
            updateSymbol();

            div.appendChild(bitSelect); div.appendChild(basisSelect); div.appendChild(symbolDiv);
            container.appendChild(div);
        }
    }

    function toggleEveDevice() {
        document.getElementById('eve-device').style.display = document.getElementById('eveToggle').checked ? 'flex' : 'none';
    }

    function measureState(inBit, inBasis, measureBasis) {
        if (inBasis === measureBasis) return inBit;
        else return Math.random() < 0.5 ? 0 : 1; 
    }

    function createStaticBox(data) {
        return `<div style="font-size:12px; margin-bottom:5px;">Bit: ${data.bit}</div><div style="font-size:12px; font-weight:bold; color:#d32f2f;">기저: ${data.basis}</div><div class="symbol">${getSymbol(data.bit, data.basis)}</div>`;
    }

    async function dynamicDelay(baseMs) {
        let elapsed = 0;
        const step = 20; 
        while(elapsed < baseMs) {
            // 10배속 적용
            let mult = document.getElementById('fastModeToggle').checked ? 0.1 : 1;
            await new Promise(r => setTimeout(r, step));
            elapsed += (step / mult);
        }
    }

    function getRotation(basis) {
        return basis === '+' ? '0deg' : '45deg'; 
    }

    function movePhoton(element, targetLeft, durationStr) {
        element.style.setProperty('--transit-time', durationStr);
        element.style.left = targetLeft;
    }

    async function sendSignal() {
        if(isSimulating) return;
        isSimulating = true;

        document.getElementById('btn-send').disabled = true;
        document.getElementById('btn-compare').disabled = true;
        document.getElementById('result-box').style.display = 'none';
        document.getElementById('eve-compare-box').style.display = 'none';
        
        aliceData = []; eveData = []; bobData = []; charlieData = [];

        const isEveActive = document.getElementById('eveToggle').checked;
        const isEvilBobActive = document.getElementById('evilBobToggle').checked;

        document.documentElement.style.setProperty('--speed-mult', document.getElementById('fastModeToggle').checked ? '0.1' : '1');

        for (let i = 0; i < NUM_BITS; i++) {
            aliceData.push({
                bit: parseInt(document.getElementById(`a-bit-${i}`).value),
                basis: document.getElementById(`a-basis-${i}`).value
            });
        }

        const eveContainer = document.getElementById('eve-container');
        const bobContainer = document.getElementById('bob-container');
        const charlieContainer = document.getElementById('charlie-container');
        
        eveContainer.innerHTML = ''; bobContainer.innerHTML = ''; charlieContainer.innerHTML = '';

        document.getElementById('eve-section').style.display = isEveActive ? 'block' : 'none';
        document.getElementById('bob-waiting').style.display = 'none';
        document.getElementById('bob-section').style.display = 'block';
        document.getElementById('charlie-section').style.display = isEvilBobActive ? 'block' : 'none';

        for(let i=0; i<NUM_BITS; i++) {
            if (isEveActive) { let div = document.createElement('div'); div.className = 'bit-box'; div.id = `eve-box-${i}`; eveContainer.appendChild(div); }
            let bDiv = document.createElement('div'); bDiv.className = 'bit-box'; bDiv.id = `bob-box-${i}`; bobContainer.appendChild(bDiv);
            if (isEvilBobActive) { let cDiv = document.createElement('div'); cDiv.className = 'bit-box'; cDiv.id = `charlie-box-${i}`; charlieContainer.appendChild(cDiv); }
        }

        const photon = document.getElementById('photon');
        const alicePolCont = document.getElementById('alice-pol-container');
        const evePolCont = document.getElementById('eve-pol-container');
        const bobPolCont = document.getElementById('bob-pol-container');
        const alicePol = document.getElementById('alice-polarizer');
        const evePol = document.getElementById('eve-polarizer');
        const bobPol = document.getElementById('bob-polarizer');

        for (let i = 0; i < NUM_BITS; i++) {
            let currentSignal = aliceData[i];
            
            alicePolCont.style.display = 'flex';
            evePolCont.style.display = 'none';
            bobPolCont.style.display = 'none';
            
            alicePol.style.transform = `rotate(${getRotation(currentSignal.basis)})`;
            
            photon.style.display = 'block';
            photon.innerText = ''; 
            
            photon.style.left = '5%';
            await dynamicDelay(50); 
            movePhoton(photon, '16.5%', '0.6s');
            await dynamicDelay(600); 

            photon.style.transform = 'scale(1.5)';
            await dynamicDelay(200);
            
            photon.innerText = getSymbol(currentSignal.bit, currentSignal.basis); 
            
            photon.style.transform = 'scale(1)';

            if (isEveActive) {
                movePhoton(photon, '38.5%', '1s');
                await dynamicDelay(1000); 

                const randBasis = Math.random() < 0.5 ? '+' : 'x';
                evePolCont.style.display = 'flex';
                evePol.style.transform = `rotate(${getRotation(randBasis)})`;
                
                photon.style.transform = 'scale(1.5)';
                await dynamicDelay(300); 

                const measuredBit = measureState(currentSignal.bit, currentSignal.basis, randBasis);
                eveData.push({ bit: measuredBit, basis: randBasis });
                
                const eBox = document.getElementById(`eve-box-${i}`);
                eBox.innerHTML = createStaticBox(eveData[i]);
                eBox.classList.add('active');

                currentSignal = { bit: measuredBit, basis: randBasis };
                photon.innerText = getSymbol(measuredBit, randBasis); 
                photon.style.transform = 'scale(1)';
                await dynamicDelay(200);
                
                movePhoton(photon, '75.5%', '1.5s');
                await dynamicDelay(1500);
            } else {
                eveData.push(null);
                movePhoton(photon, '75.5%', '2.5s');
                await dynamicDelay(2500); 
            }

            const rBasisBob = Math.random() < 0.5 ? '+' : 'x';
            bobPolCont.style.display = 'flex';
            bobPol.style.transform = `rotate(${getRotation(rBasisBob)})`;
            
            photon.style.transform = 'scale(1.5)';
            await dynamicDelay(300);

            const mBitBob = measureState(currentSignal.bit, currentSignal.basis, rBasisBob);
            bobData.push({ bit: mBitBob, basis: rBasisBob });

            const bBox = document.getElementById(`bob-box-${i}`);
            bBox.innerHTML = createStaticBox(bobData[i]);
            bBox.classList.add('active');

            photon.innerText = getSymbol(mBitBob, rBasisBob);
            photon.style.transform = 'scale(1)';
            await dynamicDelay(200);
            
            movePhoton(photon, '87%', '0.4s');
            await dynamicDelay(400);

            if (isEvilBobActive) {
                const rBasisCharlie = Math.random() < 0.5 ? '+' : 'x';
                const mBitCharlie = measureState(bobData[i].bit, bobData[i].basis, rBasisCharlie);
                charlieData.push({ bit: mBitCharlie, basis: rBasisCharlie });
                
                const cBox = document.getElementById(`charlie-box-${i}`);
                cBox.innerHTML = createStaticBox(charlieData[i]);
                cBox.classList.add('active');
            }

            photon.style.display = 'none';
            await dynamicDelay(150); 
        }

        alicePolCont.style.display = 'none';
        bobPolCont.style.display = 'none';
        
        // 통신 완료 직후 도청자(Eve) 결과 자동 표시
        if (isEveActive) {
            let eveErrors = 0;
            for(let i=0; i<NUM_BITS; i++) {
                if(aliceData[i].basis !== eveData[i].basis) {
                    document.getElementById(`eve-box-${i}`).classList.add('eve-mismatch');
                    if(aliceData[i].bit !== eveData[i].bit) eveErrors++;
                }
            }
            const eveCompareBox = document.getElementById('eve-compare-box');
            eveCompareBox.style.display = 'block';
            eveCompareBox.innerHTML = `<strong>[도청자 정보 탈취 상태 자동 분석]</strong><br>빨간색 테두리는 이브가 잘못된 필터를 선택해 <strong>양자 상태가 붕괴된 비트</strong>입니다.<br>도청으로 인해 이브가 잘못 읽은 비트 수: ${eveErrors}개`;
        }

        document.getElementById('btn-send').disabled = false;
        document.getElementById('btn-compare').disabled = false;
        isSimulating = false;
    }

    function compareBits() {
        const isEvilBobActive = document.getElementById('evilBobToggle').checked;
        const resultBox = document.getElementById('result-box');
        
        resultBox.style.display = 'block';
        let resultHTML = "";

        // 기존 수신자/제삼자 박스 초기화 (이브 박스는 자동 표시된 상태 유지)
        document.querySelectorAll('#bob-container .bit-box, #charlie-container .bit-box').forEach(box => {
            box.classList.remove('discarded');
        });

        if (!isEvilBobActive) {
            let isMismatched = false;
            let comparedCount = 0;

            for (let i = 0; i < NUM_BITS; i++) {
                if (aliceData[i].basis !== bobData[i].basis) {
                    document.getElementById(`bob-box-${i}`).classList.add('discarded');
                } else {
                    comparedCount++;
                    if (aliceData[i].bit !== bobData[i].bit) isMismatched = true;
                }
            }

            if (comparedCount === 0) resultHTML = "비교 가능한 비트가 없습니다.";
            else if (isMismatched) resultHTML = "<br><span style='color:#d32f2f; font-weight:bold; font-size:20px;'>차이 발생(도청 있음) 🚨</span>";
            else resultHTML = "<br><span style='color:#388e3c; font-weight:bold; font-size:20px;'>일치(도청 없음) ✅</span>";
            
            resultBox.innerHTML = `<strong>[최종 수신자 통신 결과]</strong><br>같은 편극으로 측정된 ${comparedCount}비트 비교 완료 ${resultHTML}`;

        } else {
            let isBobEvil = false;
            let checkCount = 0;

            for (let i = 0; i < NUM_BITS; i++) {
                if (aliceData[i].basis === bobData[i].basis) {
                    document.getElementById(`bob-box-${i}`).classList.add('discarded');
                    document.getElementById(`charlie-box-${i}`).classList.add('discarded');
                    continue;
                }

                if (aliceData[i].basis === charlieData[i].basis) {
                    checkCount++;
                    if (aliceData[i].bit !== charlieData[i].bit) isBobEvil = true;
                } else {
                    document.getElementById(`charlie-box-${i}`).classList.add('discarded');
                }
            }

            if (checkCount === 0) resultHTML = "검증 가능한 비트가 없습니다.";
            else if (isBobEvil) resultHTML = "<br><span style='color:#d32f2f; font-weight:bold; font-size:20px;'>차이 발생(김은찬이 도청자!) 🚨</span>";
            else resultHTML = "<br><span style='color:#388e3c; font-weight:bold; font-size:20px;'>일치(김은찬 정상) ✅</span>";
            
            resultBox.innerHTML = `<strong>[제삼자 검증 결과]</strong><br>총 ${checkCount}비트 검증됨 ${resultHTML}`;
        }
    }

    window.onload = initAlice;
</script>
</body>
</html>
